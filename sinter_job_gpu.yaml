# Runs tsim sinter collection on GPU spot instances.
#
# Uses collect_tsim.py (Python runner) instead of `sinter collect` CLI
# because the CLI doesn't support custom_decoders.
#
# Circuits are .circuit files (tsim text format) uploaded to S3.
#
# Usage:
#   sky launch sinter_job_gpu.yaml -y -d \
#     --name sinter-gpu-batch-0 \
#     --env BATCH_ID=0 \
#     --env MAX_SHOTS=1000000 \
#     --env MAX_ERRORS=10000 \
#     -i 20 --down

name: sinter-gpu-batch-${BATCH_ID}

resources:
  accelerators: {L4:1, L40S:1, A10:1, A10G:1, A100-80GB:1, RTX4090:1, RTX3090:1}
  use_spot: true
  # :resume tag pins the paper-v1 GPU image that ships with
  # --save-resume-filepath support in collect_tsim.py. The prior :latest
  # image predates that flag; Config B CSVs generated 2026-04-22 used
  # :latest and are preserved under results/multicloud/.
  image_id: docker:ohheyitsbrian/qec-kiln-worker-gpu:resume
  any_of:
    - cloud: aws
    - cloud: runpod
    # vast disabled: SkyPilot 0.12.0 incompatible with vastai-sdk 1.0.x
    # see skypilot-org/skypilot#9362 and PR #9314
    # - cloud: vast

envs:
  BATCH_ID: "0"
  DECODER: "pymatching"
  MAX_SHOTS: "1000000"
  MAX_ERRORS: "10000"

# RunPod doesn't support FUSE-mounting S3, so we COPY circuits in at job
# start and explicitly aws s3 cp the results back. Works on AWS too.
file_mounts:
  /circuits:
    source: s3://qec-kiln-circuits
    mode: COPY

run: |
  set -euo pipefail

  BATCH_DIR="/circuits/batch_${BATCH_ID}"
  LOCAL_CSV="/tmp/stats_gpu_batch_${BATCH_ID}.csv"
  RESUME_CSV="/tmp/resume_gpu_batch_${BATCH_ID}.csv"
  S3_OUT="s3://qec-kiln-results/gpu_batch_${BATCH_ID}/stats.csv"
  S3_PARTIAL="s3://qec-kiln-results/gpu_batch_${BATCH_ID}/stats.partial.csv"

  CIRCUIT_COUNT=$(ls "$BATCH_DIR"/*.circuit 2>/dev/null | wc -l)
  echo "GPU Batch ${BATCH_ID}: ${CIRCUIT_COUNT} circuits"
  echo "Decoder: ${DECODER}"
  echo "Max shots: ${MAX_SHOTS}, Max errors: ${MAX_ERRORS}"

  # Verify GPU is visible
  python3 -c "import jax; print(f'JAX devices: {jax.devices()}')"

  if [ "$CIRCUIT_COUNT" -eq 0 ]; then
    echo "No .circuit files found in ${BATCH_DIR}, exiting."
    exit 0
  fi

  # awscli isn't in the docker image; install at runtime (~30 sec)
  pip install --quiet awscli

  # Spot-preempt durability: if a prior run's partial CSV survives in S3,
  # pull it down so sinter's --save-resume-filepath picks up where the
  # preempted run left off instead of restarting sampling from scratch.
  if aws s3 ls "${S3_PARTIAL}" >/dev/null 2>&1; then
    echo "Found prior partial at ${S3_PARTIAL}; resuming."
    aws s3 cp "${S3_PARTIAL}" "${RESUME_CSV}"
    echo "  resume CSV has $(wc -l < "${RESUME_CSV}") lines."
  fi

  # Background sync: upload the growing resume CSV to S3 every 60s so
  # spot preemption preserves progress. sinter writes to RESUME_CSV
  # atomically via rename, so a straight aws s3 cp is safe.
  (
    while true; do
      sleep 60
      if [ -f "${RESUME_CSV}" ]; then
        aws s3 cp "${RESUME_CSV}" "${S3_PARTIAL}" --only-show-errors 2>/dev/null || true
      fi
    done
  ) &
  SYNC_PID=$!
  trap 'kill ${SYNC_PID} 2>/dev/null || true' EXIT

  # Use Python runner (CLI can't do custom_decoders).
  # --no-reference-samples + --postselect-all-detectors are required for the
  # ancilla-encoded-syndrome distillation circuits (tsim ref sampling would
  # XOR against a random-branch reference and wash out post-selection).
  python3 /workspace/collect_tsim.py \
    --circuits-dir "${BATCH_DIR}" \
    --output-csv "${LOCAL_CSV}" \
    --max-shots "${MAX_SHOTS}" \
    --max-errors "${MAX_ERRORS}" \
    --decoder "${DECODER}" \
    --num-workers 1 \
    --no-reference-samples \
    --postselect-all-detectors \
    --save-resume-filepath "${RESUME_CSV}"

  kill ${SYNC_PID} 2>/dev/null || true
  wait ${SYNC_PID} 2>/dev/null || true

  # Upload final CSV and remove the partial.
  aws s3 cp "${LOCAL_CSV}" "${S3_OUT}"
  aws s3 rm "${S3_PARTIAL}" 2>/dev/null || true

  echo ""
  echo "GPU Batch ${BATCH_ID} complete. Results at ${S3_OUT}"
  echo "Lines: $(wc -l < "${LOCAL_CSV}")"

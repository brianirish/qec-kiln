# Runs tsim sinter collection on GPU spot instances.
#
# Uses collect_tsim.py (Python runner) instead of `sinter collect` CLI
# because the CLI doesn't support custom_decoders.
#
# Circuits are .circuit files (tsim text format) uploaded to S3.
#
# Usage:
#   sky launch sinter_job_gpu.yaml -y -d \
#     --name sinter-gpu-batch-0 \
#     --env BATCH_ID=0 \
#     --env MAX_SHOTS=1000000 \
#     --env MAX_ERRORS=10000 \
#     -i 20 --down

name: sinter-gpu-batch-${BATCH_ID}

resources:
  accelerators: {L4:1, L40S:1, A10:1, A10G:1, A100-80GB:1, RTX4090:1, RTX3090:1}
  use_spot: true
  image_id: docker:ohheyitsbrian/qec-kiln-worker-gpu:latest
  any_of:
    - cloud: aws

envs:
  BATCH_ID: "0"
  DECODER: "pymatching"
  MAX_SHOTS: "1000000"
  MAX_ERRORS: "10000"

# RunPod doesn't support FUSE-mounting S3, so we COPY circuits in at job
# start and explicitly aws s3 cp the results back. Works on AWS too.
file_mounts:
  /circuits:
    source: s3://qec-kiln-circuits
    mode: COPY

run: |
  set -euo pipefail

  BATCH_DIR="/circuits/batch_${BATCH_ID}"
  LOCAL_CSV="/tmp/stats_gpu_batch_${BATCH_ID}.csv"
  S3_OUT="s3://qec-kiln-results/gpu_batch_${BATCH_ID}/stats.csv"

  CIRCUIT_COUNT=$(ls "$BATCH_DIR"/*.circuit 2>/dev/null | wc -l)
  echo "GPU Batch ${BATCH_ID}: ${CIRCUIT_COUNT} circuits"
  echo "Decoder: ${DECODER}"
  echo "Max shots: ${MAX_SHOTS}, Max errors: ${MAX_ERRORS}"

  # Verify GPU is visible
  python3 -c "import jax; print(f'JAX devices: {jax.devices()}')"

  if [ "$CIRCUIT_COUNT" -eq 0 ]; then
    echo "No .circuit files found in ${BATCH_DIR}, exiting."
    exit 0
  fi

  # awscli isn't in the docker image; install at runtime (~30 sec)
  pip install --quiet awscli

  # Use Python runner (CLI can't do custom_decoders)
  python3 /workspace/collect_tsim.py \
    --circuits-dir "${BATCH_DIR}" \
    --output-csv "${LOCAL_CSV}" \
    --max-shots "${MAX_SHOTS}" \
    --max-errors "${MAX_ERRORS}" \
    --decoder "${DECODER}" \
    --num-workers 1

  # Upload results back to S3 (RunPod can't FUSE-mount, so we copy explicitly)
  aws s3 cp "${LOCAL_CSV}" "${S3_OUT}"

  echo ""
  echo "GPU Batch ${BATCH_ID} complete. Results at ${S3_OUT}"
  echo "Lines: $(wc -l < "${LOCAL_CSV}")"
